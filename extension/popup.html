<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Brain Clipper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>AI Brain Clipper</h1>
      <p class="subtitle">Dang nhap de luu highlight vao Knowledge Graph.</p>

      <div id="auth-state" class="card"></div>

      <form id="login-form" class="card">
        <label>
          API Base URL
          <input id="api-base-url" type="url" placeholder="https://aiinterviewcoach.id.vn/api" />
        </label>
        <label>
          Email
          <input id="email" type="email" required />
        </label>
        <label>
          Mat khau
          <input id="password" type="password" required />
        </label>
        <button type="submit">Dang nhap</button>
        <button id="google-login-btn" type="button" class="secondary">Dang nhap voi Google</button>
      </form>

      <div id="job-card" class="card" style="display:none;">
        <div style="font-size:12px;color:#cbd5e1;margin-bottom:6px;">Job clip gan nhat</div>
        <div id="job-meta" style="font-size:11px;color:#94a3b8;word-break:break-all;margin-bottom:8px;"></div>
        <button id="refresh-job-btn" type="button" class="secondary">Xem trang thai job</button>
        <div id="job-status" style="font-size:12px;margin-top:8px;color:#94a3b8;"></div>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
